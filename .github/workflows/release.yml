name: Release Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Copy app icon
        run: cp -r resources/res/* android/app/src/main/res/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Configure signing
        run: bash scripts/configure-signing.sh

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/periorg.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_storeFile: periorg.jks
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK is signed
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Found APK: $APK"
          if echo "$APK" | grep -q "unsigned"; then
            echo "ERROR: APK is unsigned!"
            exit 1
          fi
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify --verbose "$APK"

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          mv "$APK" periorg-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PeriOrg v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: periorg-v${{ steps.version.outputs.version }}.apk
